name: Compliance Scrubber
description: Cybersecurity compliance environment.
version: "1.0.0"

observation_space:
  type: text
  description: Server logs and DB states.

action_space:
  type: discrete
  actions:
    - ExecuteSQL
    - ReadFile
    - WriteFile
    - ListFiles
    - SubmitTask
  description: Agent actions.

endpoints:
  health: /
  reset:  /reset
  step:   /step
  state:  /state

tasks:
  - id: easy
    description: Redact the SSN in user_data.txt
    steps: 1
    ideal_action: SubmitTask
  - id: medium
    description: GDPR Compliance - Delete User 405
    steps: 1
    ideal_action: SubmitTask
  - id: hard
    description: Data Retention Audit
    steps: 1
    ideal_action: SubmitTask

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5